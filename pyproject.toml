[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
markers = [
  "smoke: fast environment and dependency smoke tests",
  "integration: integration tests that touch local services or model assets",
  "evaluation: offline evaluation workflows and regression checks",
]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I"]
